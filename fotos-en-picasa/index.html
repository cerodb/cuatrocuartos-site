<script>
  (function () {
    var platformMatchers = [
      { name: "spotify", pattern: /(^|\.)open\.spotify\.com$/ },
      { name: "apple_music", pattern: /(^|\.)music\.apple\.com$/ },
      { name: "youtube_music", pattern: /(^|\.)music\.youtube\.com$/ },
      { name: "deezer", pattern: /(^|\.)deezer\.com$/ },
      { name: "tidal", pattern: /(^|\.)tidal\.com$/ },
      { name: "feature_fm", pattern: /(^|\.)ffm\.to$/ }
    ];

    function platformFor(url) {
      try {
        var host = new URL(url, window.location.href).hostname.replace(/^www\./, "");
        var match = platformMatchers.find(function (item) { return item.pattern.test(host); });
        return match ? match.name : null;
      } catch (error) {
        return null;
      }
    }

    document.addEventListener("click", function (event) {
      var link = event.target.closest ? event.target.closest("a[href]") : null;
      if (!link) return;

      var platform = platformFor(link.href);
      if (!platform || typeof window.gtag !== "function") return;

      window.gtag("event", "music_platform_click", {
        platform: platform,
        link_url: link.href,
        link_text: (link.textContent || "").trim().slice(0, 120),
        page_location: window.location.href,
        transport_type: "beacon"
      });
    });
  })();
</script>
